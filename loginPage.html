<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisiNote | Welcome</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            /* LIGHT THEME GLASSMORPHISM */
            --bg-main: #1e4b8f; /* Slightly darkened so blobs pop more, or you can keep your #3370cc */        
            --card-dark: rgba(255, 255, 255, 0.85);
            --glass-bg: rgba(255, 255, 255, 0.4);  
            --cyan-accent: #0284c7;      
            --cyan-glow: rgba(66, 81, 88, 0.2); 
            
            --text-main: #0f172a;        
            --text-muted: #64748b;      
            --input-bg: rgba(255, 255, 255, 0.7);  
            --border-color: rgba(15, 23, 42, 0.1); 
        }
        * {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #112d5c; /* Deepened base background for better blob contrast */
            position: relative;
            overflow: hidden;
            color: var(--text-main);
            /* Subtle grid background */
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* =========================================
           ANIMATED BACKGROUND BLOBS (NEW)
           ========================================= */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.7;
            z-index: 0;
            pointer-events: none;
            animation: drift alternate infinite ease-in-out;
        }

        .blob-1 {
            width: 500px; height: 500px;
            background: #0284c7; /* Cyan */
            top: -10%; left: -10%;
            animation-duration: 20s;
        }

        .blob-2 {
            width: 600px; height: 600px;
            background: #8b5cf6; /* Purple/Violet */
            bottom: -20%; right: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 400px; height: 400px;
            background: #38bdf8; /* Light Blue */
            top: 40%; left: 50%;
            animation-duration: 22s;
            animation-delay: -10s;
        }

        @keyframes drift {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-40px, 60px) scale(0.9); }
            100% { transform: translate(20px, 20px) scale(1.05); }
        }

        /* Brand Logo Top Left */
        .login-brand {
            position: absolute;
            top: 40px;
            left: 50px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .brand-text-login {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff; /* Adjusted to white for contrast against dark blue bg */
        }
        
        .brand-text-login span { color: #38bdf8; } /* Lighter cyan for logo span */

        /* =========================================
           MAIN GLASS CONTAINER
           ========================================= */
        .main-container {
            position: relative;
            width: 900px;
            height: 550px;
            max-width: 95%;
            background: rgb(30 17 17 / 40%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4),
                        inset 0 0 20px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            z-index: 2;
        }

        /* =========================================
           THE VORTEX PATH ANIMATION
           ========================================= */
        .vortex-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .vortex-mist {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 350px; height: 350px;
            background: radial-gradient(circle, var(--cyan-glow) 0%, transparent 70%);
            filter: blur(50px);
            animation: pulse 4s infinite alternate ease-in-out;
        }

        .vortex-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1); /* Adjusted for visibility */
            transform: translate(-50%, -50%);
            animation: spin infinite linear;
        }

        .vortex-ring::after {
            content: '';
            position: absolute;
            top: -4px; left: 50%;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px 4px var(--cyan-accent);
        }

        .ring-1 { width: 120px; height: 120px; animation-duration: 4s; border: 1px dashed rgba(255, 255, 255, 0.3); }
        .ring-2 { width: 240px; height: 240px; animation-duration: 7s; animation-direction: reverse; }
        .ring-3 { width: 380px; height: 380px; animation-duration: 10s; border: 1px dashed rgba(255, 255, 255, 0.2); }
        .ring-4 { width: 540px; height: 540px; animation-duration: 14s; animation-direction: reverse; }
        .ring-5 { width: 720px; height: 720px; animation-duration: 20s; border: 1px dotted rgba(255, 255, 255, 0.15); }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* =========================================
           THE SOLID DARK DASHBOARD PANEL
           ========================================= */
        .form-panel {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            background: var(--card-dark);
            box-shadow: -15px 0 40px rgba(0, 0, 0, 0.1);
            transition: left 0.7s cubic-bezier(0.68, -0.55, 0.265, 1.15);
            z-index: 3;
            overflow: hidden;
            border-left: 1px solid rgba(255, 255, 255, 0.5);
        }

        .main-container.register-mode .form-panel {
            left: 0;
            box-shadow: 15px 0 40px rgba(0, 0, 0, 0.1);
            border-left: none;
            border-right: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* =========================================
           FORM WRAPPERS & FADING
           ========================================= */
        .form-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .login-form { opacity: 1; visibility: visible; }
        .register-form { opacity: 0; visibility: hidden; }

        .main-container.register-mode .login-form { opacity: 0; visibility: hidden; transition-delay: 0s; }
        .main-container.register-mode .register-form { opacity: 1; visibility: visible; transition-delay: 0.3s; }
        .main-container:not(.register-mode) .login-form { transition-delay: 0.3s; }

        .cyan-heading {
            color: var(--cyan-accent);
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .form-wrapper p.subtext {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        /* =========================================
           INPUT FIELDS
           ========================================= */
        .input-box {
            position: relative;
            margin: 8px 0;
            width: 100%;
        }
        
        .input-box input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }
        
        .input-box input::placeholder { color: #52525b; font-weight: 500; }
        
        .input-box input:focus {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.15);
        }

        .input-box i.input-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #52525b;
            font-size: 15px;
            pointer-events: none;
            transition: 0.3s;
        }

        .input-box input:focus ~ i.input-icon { color: var(--cyan-accent); }

        .input-row { display: flex; gap: 10px; width: 100%; }

        /* =========================================
           BUTTONS & LINKS
           ========================================= */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--cyan-accent);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.5);
            background: #0ea5e9;
        }

        .forgot-link {
            width: 100%;
            text-align: right;
            margin-top: -3px;
            margin-bottom: 5px;
        }
        .forgot-link a { color: var(--text-muted); font-size: 12px; transition: 0.3s; font-weight: 600; }
        .forgot-link a:hover { color: var(--cyan-accent); }

        .swap-mode {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .swap-link {
            color: var(--cyan-accent);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .swap-link:hover { text-shadow: 0 0 10px rgba(0, 229, 255, 0.6); }

        .social-icons { display: flex; gap: 12px; margin-top: 15px; }
        .social-icons button {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 45px; height: 45px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .social-icons button:hover {
            border-color: var(--cyan-accent);
            color: var(--cyan-accent);
            background: rgba(0, 229, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .ai-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
            background: none; border: none; color: #52525b; font-size: 15px; 
            cursor: pointer; transition: 0.3s; padding: 5px;
        }
        .ai-btn:hover { color: var(--cyan-accent); transform: translateY(-50%) scale(1.15); text-shadow: 0 0 10px var(--cyan-accent); }
        .fa-spin-fast { animation: fa-spin 0.8s infinite linear; }
        
        #ai-greeting { font-style: italic; min-height: 20px; }

        @media (max-width: 768px) {
            .form-panel { width: 100%; left: 0 !important; border-radius: 24px; box-shadow: none; border: none; }
            .vortex-container { display: none; }
        }
    </style>
</head>

<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>

    <div id="floating-notes-bg" style="position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1;"></div>

    <div class="login-brand">
        <span class="brand-text-login">Visi<span>Note</span></span>
    </div>

    <div class="main-container" id="mainContainer">
        
        <div class="vortex-container">
            <div class="vortex-mist"></div>
            <div class="vortex-ring ring-1"></div>
            <div class="vortex-ring ring-2"></div>
            <div class="vortex-ring ring-3"></div>
            <div class="vortex-ring ring-4"></div>
            <div class="vortex-ring ring-5"></div>
        </div>

        <div class="form-panel">
            
            <div class="form-wrapper login-form" id="loginForm">
                <form id="firebase-login" style="width: 100%;">
                    <h1 class="cyan-heading">Welcome Back</h1>
                    <p class="subtext" id="ai-greeting">Generating daily inspiration...</p>
                    
                    <div class="input-box">
                        <input type="text" id="login-username" placeholder="Username" required>
                        <i class="fa-solid fa-user input-icon"></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="login-password" placeholder="Password" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                    
                    <div class="forgot-link">
                        <a href="#" id="forgot-password-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn-submit">Enter Workspace</button>
                    
                    <div style="display: flex; justify-content: center; width: 100%;">
                        <div class="social-icons">
                            <button type="button" id="google-login"><i class="fa-brands fa-google"></i></button>
                            <button type="button" id="github-login"><i class="fa-brands fa-github"></i></button>
                        </div>
                    </div>

                    <p class="swap-mode">Don't have an account? <span class="swap-link" id="goToRegister">Sign Up</span></p>
                </form>
            </div>

            <div class="form-wrapper register-form" id="registerForm">
                <form id="firebase-register" style="width: 100%;">
                    <h1 class="cyan-heading">New Here?</h1>
                    <p class="subtext">Deploy your spatial library today.</p>
                    
                    <div class="input-row">
                        <div class="input-box">
                            <input type="text" id="register-firstname" placeholder="First Name" required>
                        </div>
                        <div class="input-box">
                            <input type="text" id="register-lastname" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="input-box">
                        <input type="text" id="register-username" placeholder="Choose Username" required>
                        <button type="button" id="ai-generate-btn" class="ai-btn" title="Generate AI Username">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>
                        </button>
                    </div>

                    <div class="input-box">
                        <input type="email" id="register-email" placeholder="Email Address" required>
                        <i class="fa-solid fa-envelope input-icon"></i>
                    </div>

                    <div class="input-box">
                        <input type="password" id="register-password" placeholder="Password" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <button type="submit" class="btn-submit">Create Account</button>
                    
                    <p class="swap-mode">Already have an account? <span class="swap-link" id="goToLogin">Sign In</span></p>
                </form>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById('floating-notes-bg');
            const numNotes = 100; // Updated to 100 notes
            const icons = ['fa-file-lines', 'fa-note-sticky', 'fa-pen-to-square', 'fa-cube', 'fa-vr-cardboard'];

            for (let i = 0; i < numNotes; i++) {
                const note = document.createElement('div');
                
                // Pure CSS for the glass note
                note.style.cssText = `
                    position: absolute;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    background: rgba(255, 255, 255, 0.05); /* slightly increased for visibility against blobs */
                    backdrop-filter: blur(4px);
                    border: 1px solid rgba(255, 255, 255, 0.1);
                    border-radius: 12px;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
                `;
                
                // Random Size (Smaller sizes since there are 100)
                const size = Math.random() * 40 + 20; 
                note.style.width = `${size}px`;
                note.style.height = `${size}px`;

                // Initial Position
                note.style.left = `${Math.random() * 100}vw`;
                note.style.top = `${Math.random() * 120}vh`;

                // Add random icon inside
                const icon = document.createElement('i');
                icon.className = `fa-solid ${icons[Math.floor(Math.random() * icons.length)]}`;
                icon.style.color = 'rgba(255, 255, 255, 0.3)';
                icon.style.fontSize = `${size * 0.4}px`;
                note.appendChild(icon);

                container.appendChild(note);

                // Anime.js Animation properties
                anime({
                    targets: note,
                    translateY: () => [anime.random(0, 100), anime.random(-600, -1200)],
                    translateX: () => [anime.random(-50, 50), anime.random(-150, 150)],
                    rotateZ: () => [anime.random(-20, 20), anime.random(-90, 90)],
                    rotateX: () => anime.random(-45, 45),
                    rotateY: () => anime.random(-45, 45),
                    opacity: [
                        { value: Math.random() * 0.3 + 0.2, duration: anime.random(2000, 4000) },
                        { value: 0, duration: anime.random(2000, 4000), delay: anime.random(4000, 10000) }
                    ],
                    duration: () => anime.random(15000, 35000), // Slower to handle 100 objects smoothly
                    easing: 'linear',
                    loop: true,
                    delay: () => anime.random(0, 8000) // Stagger start times
                });
            }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
            GoogleAuthProvider, GithubAuthProvider, signInWithPopup, sendPasswordResetEmail
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, setDoc, doc, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const mainContainer = document.getElementById('mainContainer');
        const goToRegister = document.getElementById('goToRegister');
        const goToLogin = document.getElementById('goToLogin');

        goToRegister.addEventListener('click', () => {
            mainContainer.classList.add('register-mode');
        });

        goToLogin.addEventListener('click', () => {
            mainContainer.classList.remove('register-mode');
        });

        const apiKey = ""; // Add your Gemini API key here

        async function fetchGeminiData(prompt) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };

            let retries = 5;
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2; 
                }
            }
        }

        const aiGenerateBtn = document.getElementById('ai-generate-btn');
        const usernameInput = document.getElementById('register-username');

        aiGenerateBtn.addEventListener('click', async () => {
            const icon = aiGenerateBtn.querySelector('i');
            icon.classList.replace('fa-wand-magic-sparkles', 'fa-circle-notch');
            icon.classList.add('fa-spin-fast');
            aiGenerateBtn.style.pointerEvents = 'none';

            try {
                const generatedUsername = await fetchGeminiData("Generate exactly 1 unique, short, professional single-word username for a user joining a smart note-taking app named VisiNote. Return ONLY the username in lowercase.");
                if (generatedUsername) {
                    usernameInput.value = generatedUsername;
                    usernameInput.style.borderColor = 'var(--cyan-accent)';
                    setTimeout(() => usernameInput.style.borderColor = 'var(--border-color)', 800);
                }
            } catch (e) {
                usernameInput.placeholder = "Generation failed.";
            } finally {
                icon.classList.remove('fa-spin-fast', 'fa-circle-notch');
                icon.classList.add('fa-wand-magic-sparkles');
                aiGenerateBtn.style.pointerEvents = 'auto';
            }
        });

        async function loadAIGreeting() {
            const greetingElement = document.getElementById('ai-greeting');
            try {
                const greeting = await fetchGeminiData("Write a max 10 word inspiring welcoming sentence for a user logging into a smart workspace named VisiNote. Return ONLY the sentence.");
                if (greeting) greetingElement.innerHTML = `"${greeting}"`;
            } catch (e) {
                greetingElement.innerHTML = "To keep connected with us please login.";
            }
        }
        loadAIGreeting();

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCucq4_5EvxozxTaEk52MTkVyWvv7RqwUg",
            authDomain: "arcardia-6b034.firebaseapp.com",
            projectId: "arcardia-6b034",
            storageBucket: "arcardia-6b034.firebasestorage.app",
            messagingSenderId: "394979413394",
            appId: "1:394979413394:web:38cdcad9bc68b8795d854b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ==========================================
        // FIREBASE REGISTRATION LOGIC
        // ==========================================
        document.getElementById('firebase-register').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            // Grab data
            const firstName = document.getElementById('register-firstname').value;
            const lastName = document.getElementById('register-lastname').value;
            const username = document.getElementById('register-username').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;

            try {
                // 1. Create account in Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Save extra details (Name & Username) to Firestore Database
                await addDoc(collection(db, "users"), {
                    uid: user.uid,
                    firstName: firstName,
                    lastName: lastName,
                    username: username,
                    email: email,
                    createdAt: new Date()
                });


                setTimeout(() => {
                    window.location.href = "main.html";
                }, 800); 

            } catch (error) {
                alert("Registration Failed: " + error.message);
            }
        });

        // ==========================================
        // FIREBASE LOGIN LOGIC (USING USERNAME)
        // ==========================================
        document.getElementById('firebase-login').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const usernameInput = document.getElementById('login-username').value;
            const passwordInput = document.getElementById('login-password').value;

            try {
                // 1. Search Firestore for the user's hidden Email using their Username
                const usersRef = collection(db, "users");
                const q = query(usersRef, where("username", "==", usernameInput));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    alert("Username not found. Please register or check your spelling.");
                    return;
                }

                let userEmail = "";
                querySnapshot.forEach((doc) => {
                    userEmail = doc.data().email;
                });

                // 2. Log them in using their extracted email and typed password
                await signInWithEmailAndPassword(auth, userEmail, passwordInput);
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 800); 

            } catch (error) {
                alert("Login Failed: Incorrect password or connection issue.");
                console.error(error);
            }
        });

        // ==========================================
        // PASSWORD RESET & SOCIAL LOGINS
        // ==========================================
        document.getElementById('forgot-password-link').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt("Enter registered email:");
            if(email) {
                try {
                    await sendPasswordResetEmail(auth, email);
                    alert("Reset link sent!");
                } catch (err) { alert("Error: " + err.message); }
            }
        });

        async function handleSocialLogin(provider) {
            try {
                const res = await signInWithPopup(auth, provider);
                await setDoc(doc(db, "users", res.user.uid), {
                    uid: res.user.uid, firstName: res.user.displayName?.split(' ')[0] || "User",
                    lastName: res.user.displayName?.split(' ').slice(1).join(' ') || "",
                    email: res.user.email, username: res.user.email.split('@')[0], createdAt: new Date()
                }, { merge: true }); 
                window.location.href = "main.html";
            } catch (err) { alert("Error: " + err.message); }
        }

        document.getElementById('google-login').addEventListener('click', () => handleSocialLogin(new GoogleAuthProvider()));
        document.getElementById('github-login').addEventListener('click', () => handleSocialLogin(new GithubAuthProvider()));
    </script>
</body>
</html>
