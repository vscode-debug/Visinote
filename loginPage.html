<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | VisiNote</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

    <style>
      body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; overflow: hidden; perspective: 1200px; }
      
      .premium-glass {
        background: linear-gradient(135deg, rgba(20,20,20,0.85), rgba(10,10,10,0.95));
        backdrop-filter: blur(40px); border: 1px solid rgba(139,92,246,0.3);
        box-shadow: 0 40px 80px -20px rgba(0,0,0,0.9), inset 0 1px 0 rgba(139,92,246,0.5);
      }

      /* 3D Pop In Animation for the Modal */
      @keyframes popIn3D {
        0% { opacity: 0; transform: perspective(1200px) translateZ(-200px) rotateX(15deg) scale(0.9); }
        100% { opacity: 1; transform: perspective(1200px) translateZ(0) rotateX(0) scale(1); }
      }
      .modal-3d-enter { animation: popIn3D 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

      /* 3D Folding Input Fields */
      .field-3d-fold {
        transform-origin: top; transform: perspective(800px) rotateX(-90deg);
        opacity: 0; max-height: 0; margin-bottom: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .field-3d-fold.show-signup {
        transform: perspective(800px) rotateX(0deg); opacity: 1; max-height: 100px; margin-bottom: 0.75rem; 
      }

      /* Buttons & Inputs */
      .btn-3d { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
      .btn-3d:hover { transform: translateY(-4px) translateZ(10px); box-shadow: 0 15px 25px -5px rgba(139, 92, 246, 0.4); }
      .btn-3d:active { transform: translateY(2px) translateZ(0); box-shadow: 0 5px 10px -5px rgba(139, 92, 246, 0.4); }
      
      .social-btn { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
      .social-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(139, 92, 246, 0.4); transform: translateY(-2px); }

      .input-glow:focus { box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.4), inset 0 0 10px rgba(139, 92, 246, 0.1); }
      
      /* Subtle Floating Animation */
      @keyframes float3D {
        0%, 100% { transform: perspective(1200px) translateY(0) rotateX(2deg) rotateY(-2deg); }
        50% { transform: perspective(1200px) translateY(-10px) rotateX(-2deg) rotateY(2deg); }
      }
      .animate-float-3d { animation: float3D 6s ease-in-out infinite; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white relative">
    
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1517842645767-c639042777db?auto=format&fit=crop&q=80&w=2000')] bg-cover opacity-20"></div>
    <div class="absolute -top-32 -right-32 w-96 h-96 bg-purple-600/30 blur-[100px] rounded-full"></div>
    <div class="absolute -bottom-32 -left-32 w-96 h-96 bg-cyan-600/20 blur-[100px] rounded-full"></div>

    <button onclick="window.location.href='heropage.html'" class="absolute top-8 left-8 text-slate-400 hover:text-white z-50 flex items-center gap-2 transition-colors">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </button>

    <div class="premium-glass w-[90%] max-w-md p-10 rounded-[2.5rem] relative z-10 modal-3d-enter animate-float-3d group">
        
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-purple-500/20 blur-[50px] rounded-full group-hover:bg-purple-500/30 transition-colors duration-700 pointer-events-none"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-500 to-purple-700 rounded-2xl flex items-center justify-center shadow-[0_10px_30px_-10px_rgba(139,92,246,0.6)] mx-auto mb-5 transform transition-transform hover:rotate-12 duration-300">
                <i class="fa-solid fa-cube text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold mb-2 tracking-tight" id="authTitle">Welcome Back</h2>
            <p class="text-sm text-slate-400 font-medium" id="authSubTitle">Log in to manage your spatial workspace</p>
        </div>

        <div id="authError" class="hidden bg-red-500/20 border border-red-500 text-red-400 text-xs p-3 rounded-xl mb-4 text-center relative z-10"></div>

        <div class="flex flex-col gap-3 relative z-10">
            <div id="nameContainer" class="field-3d-fold">
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400/80 text-sm"></i>
                    <input type="text" id="nameInput" placeholder="Full Name" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-zinc-700/50 bg-black/40 focus:outline-none input-glow transition-all" />
                </div>
            </div>

            <div class="relative">
                <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400/80 text-sm"></i>
                <input type="email" id="emailInput" placeholder="Email address" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-zinc-700/50 bg-black/40 focus:outline-none input-glow transition-all" />
            </div>
            
            <div class="relative" id="passwordFieldContainer">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400/80 text-sm"></i>
                <input type="password" id="passwordInput" placeholder="Password" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-zinc-700/50 bg-black/40 focus:outline-none input-glow transition-all" />
            </div>
            
            <div class="flex justify-end mt-1 mb-1" id="forgotPasswordContainer">
                <button type="button" onclick="handleForgotPassword()" class="text-xs font-bold text-purple-400 hover:text-purple-300 transition-colors uppercase tracking-wider">Forgot Password?</button>
            </div>

            <div id="confirmPasswordContainer" class="field-3d-fold">
                <div class="relative">
                    <i class="fa-solid fa-shield-check absolute left-4 top-1/2 -translate-y-1/2 text-slate-400/80 text-sm"></i>
                    <input type="password" id="confirmPasswordInput" placeholder="Confirm Password" class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-zinc-700/50 bg-black/40 focus:outline-none input-glow transition-all" />
                </div>
            </div>

            <button id="mainAuthBtn" class="w-full py-4 mt-2 bg-gradient-to-r from-purple-600 to-indigo-600 text-white rounded-2xl font-bold tracking-wide btn-3d shadow-[0_10px_20px_-10px_rgba(139,92,246,0.6)]">
                Log In
            </button>

            <div class="flex items-center my-4" id="socialDivider">
                <div class="flex-grow h-[1px] bg-zinc-700/50"></div>
                <span class="px-3 text-[10px] text-slate-500 uppercase font-bold tracking-widest">Or connect with</span>
                <div class="flex-grow h-[1px] bg-zinc-700/50"></div>
            </div>

            <div class="grid grid-cols-2 gap-4" id="socialBtns">
                <button id="googleLoginBtn" type="button" class="social-btn flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-black/30 text-white text-sm font-semibold backdrop-blur-sm cursor-pointer z-20">
                    <i class="fa-brands fa-google text-red-500 text-lg"></i> Google
                </button>
                <button id="githubLoginBtn" type="button" class="social-btn flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-black/30 text-white text-sm font-semibold backdrop-blur-sm cursor-pointer z-20">
                    <i class="fa-brands fa-github text-white text-lg"></i> GitHub
                </button>
            </div>

            <div class="text-center mt-4 text-sm text-slate-400 font-medium">
                <span id="toggleText">Don't have an account?</span>
                <button id="toggleModeBtn" onclick="toggleAuthMode()" class="text-purple-400 font-bold hover:text-purple-300 ml-1 underline-offset-4 hover:underline transition-all">Sign Up</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            onAuthStateChanged, 
            updateProfile, 
            sendPasswordResetEmail,
            GoogleAuthProvider,
            GithubAuthProvider,
            signInWithPopup
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfdbA_iCryNL6JuOkZtSaPH3pEfza_rs0",
            authDomain: "visinote-66f90.firebaseapp.com",
            projectId: "visinote-66f90",
            storageBucket: "visinote-66f90.firebasestorage.app",
            messagingSenderId: "382835155909",
            appId: "1:382835155909:web:f7f8f44b85f8cdc1dce1ac"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace("dashboard.html");
        });

        let isLoginMode = true;
        let isResetMode = false;

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            isResetMode = false;
            
            document.getElementById('passwordFieldContainer').style.display = 'block';
            document.getElementById('forgotPasswordContainer').style.display = isLoginMode ? 'flex' : 'none';
            document.getElementById('socialDivider').style.display = 'flex';
            document.getElementById('socialBtns').style.display = 'grid';

            document.getElementById('authTitle').innerText = isLoginMode ? "Welcome Back" : "Create Account";
            document.getElementById('authSubTitle').innerText = isLoginMode ? "Log in to manage your spatial workspace" : "Join the future of spatial productivity";
            document.getElementById('mainAuthBtn').innerText = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById('toggleText').innerText = isLoginMode ? "Don't have an account?" : "Already have an account?";
            document.getElementById('toggleModeBtn').innerText = isLoginMode ? "Sign Up" : "Log In";
            
            if (isLoginMode) {
                document.getElementById('nameContainer').classList.remove('show-signup');
                document.getElementById('confirmPasswordContainer').classList.remove('show-signup');
            } else {
                document.getElementById('nameContainer').classList.add('show-signup');
                document.getElementById('confirmPasswordContainer').classList.add('show-signup');
            }
        };

        window.handleForgotPassword = () => {
            isResetMode = true;
            document.getElementById('authTitle').innerText = "Reset Password";
            document.getElementById('authSubTitle').innerText = "Enter your email to receive a reset link";
            document.getElementById('mainAuthBtn').innerText = "Send Reset Link";
            
            document.getElementById('passwordFieldContainer').style.display = 'none';
            document.getElementById('forgotPasswordContainer').style.display = 'none';
            document.getElementById('socialDivider').style.display = 'none';
            document.getElementById('socialBtns').style.display = 'none';
            document.getElementById('nameContainer').classList.remove('show-signup');
            document.getElementById('confirmPasswordContainer').classList.remove('show-signup');
            
            document.getElementById('toggleText').innerText = "Remember your password?";
            document.getElementById('toggleModeBtn').innerText = "Back to Log In";
        };

        // Email & Password Auth
        document.getElementById('mainAuthBtn').addEventListener('click', async () => {
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value;
            const name = document.getElementById("nameInput").value.trim();
            const errorBox = document.getElementById("authError");
            errorBox.classList.add("hidden");

            if (!email) return showErr("Please enter an email.");

            try {
                if (isResetMode) {
                    await sendPasswordResetEmail(auth, email);
                    alert("Reset link sent to your email!");
                    window.toggleAuthMode();
                } 
                else if (isLoginMode) {
                    if (!password) return showErr("Please enter a password.");
                    await signInWithEmailAndPassword(auth, email, password);
                } 
                else {
                    if (!name || !password) return showErr("Please fill all fields.");
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: name });
                }
            } catch (error) {
                showErr(error.message);
            }
        });

        // Google Login
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                showErr(error.message);
            }
        });

        // GitHub Login
        document.getElementById('githubLoginBtn').addEventListener('click', async () => {
            const provider = new GithubAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                showErr(error.message);
            }
        });

        function showErr(msg) {
            const eb = document.getElementById("authError");
            // Clean up Firebase error messages to be more user-friendly
            eb.innerText = msg.replace('Firebase: ', '');
            eb.classList.remove("hidden");
        }
    </script>
</body>
</html>
