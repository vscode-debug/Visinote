<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisiNote | The Vault</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        :root {
            --bg-main: #112d5c;       
            --glass-bg: rgba(255, 255, 255, 0.05);  
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --cyan-accent: #0284c7;      
            --cyan-glow: rgba(2, 132, 199, 0.4); 
            --text-main: #f8fafc;        
            --text-muted: #94a3b8;      
        }

        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; list-style: none; }
        body { height: 100vh; background: var(--bg-main); color: var(--text-main); overflow: hidden; display: flex; flex-direction: column; background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px); background-size: 40px 40px; }

        /* Background Blobs */
        .bg-blob { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.5; z-index: 0; pointer-events: none; animation: drift alternate infinite ease-in-out; }
        .blob-1 { width: 500px; height: 500px; background: #0284c7; top: 10%; left: -10%; animation-duration: 20s; }
        .blob-2 { width: 600px; height: 600px; background: #10b981; bottom: -10%; right: -5%; animation-duration: 25s; animation-delay: -5s; }
        @keyframes drift { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(30px, 30px) scale(1.05); } }

        /* Header */
        .header { padding: 20px 50px; background: rgba(17, 45, 92, 0.5); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .back-btn { display: flex; align-items: center; gap: 10px; color: var(--text-muted); cursor: pointer; text-decoration: none; transition: 0.3s; font-weight: 600; }
        .back-btn:hover { color: var(--cyan-accent); }
        .title { font-size: 1.5rem; font-weight: 800; color: white; }
        .title span { color: #38bdf8; }

        /* Main Content */
        .vault-container { flex: 1; padding: 40px 8%; overflow-y: auto; z-index: 10; position: relative; }
        .vault-header { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .vault-header h1 { font-size: 2.5rem; font-weight: 300; }
        .vault-header h1 span { font-weight: 700; color: var(--cyan-accent); }
        
        /* Grid */
        .notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; padding-bottom: 50px; }
        
        /* Note Card */
        .note-card { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; gap: 15px; transition: 0.3s; position: relative; overflow: hidden; }
        .note-card:hover { transform: translateY(-5px); border-color: rgba(2, 132, 199, 0.4); box-shadow: 0 10px 30px var(--cyan-glow); }
        
        .note-title { font-size: 1.2rem; font-weight: 700; color: white; }
        .note-desc { font-size: 0.95rem; color: #cbd5e1; flex: 1; line-height: 1.5; }
        
        .note-meta { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; color: var(--text-muted); }
        .meta-item { display: flex; align-items: center; gap: 8px; }
        .meta-item i { color: var(--cyan-accent); width: 14px; }

        .delete-btn { position: absolute; top: 20px; right: 20px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { background: #ef4444; color: white; }

        /* Scrollbar */
        .vault-container::-webkit-scrollbar { width: 8px; }
        .vault-container::-webkit-scrollbar-thumb { background: rgba(2, 132, 199, 0.5); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <header class="header">
        <a href="main.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        <div class="title"><i class="fa-solid fa-vault text-cyan-accent mr-2"></i> Spatial <span>Vault</span></div>
        <div style="width: 100px;"></div> </header>

    <div class="vault-container">
        <div class="vault-header">
            <div>
                <h1>Your <span>Archive</span></h1>
                <p style="color: var(--text-muted);">Manage and review all your anchored spatial notes.</p>
            </div>
            <div style="color: var(--cyan-accent); font-weight: 600;" id="total-count">Loading...</div>
        </div>

        <div class="notes-grid" id="notes-grid">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCucq4_5EvxozxTaEk52MTkVyWvv7RqwUg",
            authDomain: "arcardia-6b034.firebaseapp.com",
            projectId: "arcardia-6b034",
            storageBucket: "arcardia-6b034.firebasestorage.app",
            messagingSenderId: "394979413394",
            appId: "1:394979413394:web:38cdcad9bc68b8795d854b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const grid = document.getElementById('notes-grid');
        const countLabel = document.getElementById('total-count');

        async function fetchVaultNotes(uid) {
            try {
                const q = query(collection(db, "notes"), where("uid", "==", uid));
                const snap = await getDocs(q);
                
                let notes = [];
                snap.forEach(d => notes.push({ id: d.id, ...d.data() }));
                
                // Sort by newest first
                notes.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                countLabel.innerText = `${notes.length} Total Notes`;
                grid.innerHTML = '';

                if(notes.length === 0) {
                    grid.innerHTML = `<div style="color:var(--text-muted);">Your vault is empty. Try adding notes in AR Mode!</div>`;
                    return;
                }

                notes.forEach((note, index) => {
                    const dateStr = note.timestamp ? note.timestamp.toDate().toLocaleString() : 'Unknown Date';
                    const x = note.x ? note.x.toFixed(2) : "0.00";
                    const y = note.y ? note.y.toFixed(2) : "0.00";
                    const z = note.z ? note.z.toFixed(2) : "0.00";

                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.innerHTML = `
                        <button class="delete-btn" data-id="${note.id}" title="Delete Note"><i class="fa-solid fa-trash"></i></button>
                        <div class="note-title">${note.title || 'Untitled'}</div>
                        <div class="note-desc">${note.content || 'No description provided.'}</div>
                        <div class="note-meta">
                            <div class="meta-item"><i class="fa-solid fa-clock"></i> ${dateStr}</div>
                            <div class="meta-item"><i class="fa-solid fa-location-crosshairs"></i> Pos: [X: ${x}, Y: ${y}, Z: ${z}]</div>
                        </div>
                    `;
                    grid.appendChild(card);

                    // Animate entry
                    anime({
                        targets: card,
                        translateY: [20, 0],
                        opacity: [0, 1],
                        delay: index * 100,
                        duration: 800,
                        easing: 'easeOutQuart'
                    });
                });

                // Attach delete logic
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if(confirm("Are you sure you want to permanently delete this note?")) {
                            const id = e.currentTarget.getAttribute('data-id');
                            await deleteDoc(doc(db, "notes", id));
                            e.currentTarget.parentElement.style.display = 'none'; // hide immediately
                            fetchVaultNotes(uid); // refresh count
                        }
                    });
                });

            } catch (err) {
                console.error(err);
                grid.innerHTML = `<div style="color:#ef4444;">Error loading vault data.</div>`;
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) fetchVaultNotes(user.uid);
            else window.location.href = "loginPage.html";
        });
    </script>
</body>
</html>
