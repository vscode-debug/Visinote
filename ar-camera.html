<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AR Camera | VisiNote</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    
    <script>
        AFRAME.registerComponent('billboard', { 
            tick: function () { 
                const camera = this.el.sceneEl.camera; 
                if (camera) this.el.object3D.lookAt(camera.position); 
            } 
        });
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; width: 100%; height: 100%; overflow: hidden; position: fixed; }
        
        .arjs-loader { display: none !important; } 
        #arjs-video { position: absolute !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; object-fit: cover !important; z-index: 1 !important; transform: scaleY(1); } 
        .a-canvas { z-index: 2 !important; }
        
        .status-badge { background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(2, 132, 199, 0.4); color: #22d3ee; font-size: 0.75rem; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; pointer-events: auto; } 
        .pulse-dot { width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; animation: pulse 1.5s infinite; } 
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
        
        .action-btn { display: flex; align-items: center; gap: 8px; color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: 0.2s; pointer-events: auto; } 
        .action-btn i { font-size: 1.4rem; } 
        .action-btn:hover { color: #22d3ee; } 
        .action-btn.delete-active { color: #ef4444; } 
        
        .add-btn { background: #0284c7; color: white; width: 80px; height: 80px; border-radius: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 0 30px rgba(2, 132, 199, 0.6); pointer-events: auto; border: 2px solid rgba(34, 211, 238, 0.3); } 
        .add-btn:active { transform: scale(0.95); } 
        .add-btn i { font-size: 2rem; margin-bottom: 2px; } 
        .add-btn span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }
        
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; z-index: 99; display: flex; align-items: center; justify-content: center; transition: 0.3s; } 
        .crosshair::after { content: ''; width: 4px; height: 4px; background: #22d3ee; border-radius: 50%; }
        
        .depth-control { display: none; position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 1px solid #0284c7; padding: 12px 25px; border-radius: 30px; z-index: 101; align-items: center; gap: 15px; width: 85%; max-width: 350px; pointer-events: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } 
        .depth-slider { flex: 1; accent-color: #22d3ee; }
        
        #arModal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; pointer-events: auto; } 
        .modal-input:focus, .modal-textarea:focus { border-color: #0284c7; } 
        #tapZone { display: none; position: absolute; inset: 0; z-index: 90; cursor: crosshair; pointer-events: auto; }
        
        /* Custom Popups */
        .custom-popup-overlay { position: fixed; inset: 0; z-index: 100000; display: none; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px); padding: 20px; pointer-events: auto;} 
        .custom-popup-box { background: #0f0f14; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); color: white; } 
        .custom-popup-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: #22d3ee; } 
        .custom-popup-msg { font-size: 0.95rem; color: #cbd5e1; margin-bottom: 25px; line-height: 1.5; } 
        .custom-popup-btn { background: #0284c7; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; } 
        .custom-popup-btn-cancel { background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; width: 100%; } 
        .custom-popup-btn-danger { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%; } 
        .custom-popup-actions { display: flex; gap: 15px; }
    </style>
</head>
<body>

    <div id="customAlert" class="custom-popup-overlay"><div class="custom-popup-box"><h3 id="alertTitle" class="custom-popup-title">Notification</h3><p id="alertMessage" class="custom-popup-msg"></p><button onclick="closeCustomAlert()" class="custom-popup-btn">OK</button></div></div>
    <div id="customConfirm" class="custom-popup-overlay"><div class="custom-popup-box"><h3 id="confirmTitle" class="custom-popup-title">Confirm</h3><p id="confirmMessage" class="custom-popup-msg"></p><div class="custom-popup-actions"><button onclick="closeCustomConfirm(false)" class="custom-popup-btn-cancel">Cancel</button><button onclick="closeCustomConfirm(true)" class="custom-popup-btn-danger">Yes, Delete</button></div></div></div>

    <div id="tapZone" onclick="handlePlacementTap()"></div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;" cursor="rayOrigin: mouse; fuse: false;" raycaster="objects: .raycastable-note">
        <a-entity id="notesGroup"></a-entity>
        <a-camera id="arCamera" position="0 1.6 0" look-controls="enabled: true; magicWindowTrackingEnabled: true"></a-camera>
    </a-scene>

    <div class="absolute inset-0 z-[100] pointer-events-none flex">
        
        <aside class="w-[260px] h-full bg-[#0a0a0c] border-r border-white/10 flex flex-col justify-between py-6 pointer-events-auto hidden md:flex z-[1000]">
            <div>
                <div class="flex items-center gap-3 px-6 mb-10 cursor-pointer" onclick="window.location.href='index.html'"><div class="w-9 h-9 bg-cyan-600 rounded flex items-center justify-center shadow-lg shadow-cyan-400/20"><i class="fa-solid fa-cube text-white text-lg"></i></div><span class="text-white text-2xl font-bold tracking-tight">VisiNote</span></div>
                <nav class="flex flex-col gap-2">
                    <a href="main.html" class="flex items-center gap-4 px-6 py-3 mx-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fa-solid fa-layer-group text-xl w-6"></i><span class="font-medium text-sm tracking-wide">My Workspace</span></a>
                    <a href="ar-camera.html" class="flex items-center gap-4 px-6 py-3 mx-2 rounded-xl text-cyan-400 bg-cyan-400/10 border border-cyan-400/20 transition-all"><i class="fa-solid fa-camera text-xl w-6"></i><span class="font-medium text-sm tracking-wide">AR Camera</span></a>
                    <a href="vault.html" class="flex items-center gap-4 px-6 py-3 mx-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/5 transition-all"><i class="fa-solid fa-vault text-xl w-6"></i><span class="font-medium text-sm tracking-wide">Vault</span></a>
                </nav>
            </div>
            <div class="px-4"><button id="logout-btn" class="flex items-center gap-4 px-6 py-3 w-full rounded-xl text-red-500 hover:bg-red-500/10 transition-all text-left"><i class="fa-solid fa-arrow-right-from-bracket text-xl w-6"></i><span class="font-medium text-sm tracking-wide">Log Out</span></button></div>
        </aside>

        <div class="flex-1 relative flex flex-col justify-between">
            <div class="p-6 flex items-start justify-between pointer-events-none">
                <div class="flex items-center gap-4 pointer-events-auto">
                    <button class="w-10 h-10 bg-black/50 border border-white/10 text-white rounded-full flex items-center justify-center hover:bg-black/70 transition-all" onclick="window.location.href='main.html'"><i class="fa-solid fa-arrow-left"></i></button>
                    <div><h1 class="text-white text-lg font-bold">Spatial View</h1></div>
                </div>
                <div class="status-badge" id="statusBadge"><div class="pulse-dot"></div><span id="statusText">SPATIAL TRACKING ACTIVE</span></div>
            </div>
            
            <div class="crosshair" id="crosshair"></div>
            
            <div class="depth-control" id="depthControl">
                <i class="fa-solid fa-people-arrows text-white"></i>
                <input type="range" min="0.5" max="10" step="0.5" value="2.5" class="depth-slider" id="depthSlider" oninput="updateDepthLabel()">
                <span class="text-cyan-400 font-bold text-sm w-12 text-right" id="depthLabel">2.5m</span>
            </div>
            
            <div class="p-8 flex items-end justify-between bg-gradient-to-t from-black/80 to-transparent pointer-events-none">
                <div class="flex-1 flex justify-center items-center gap-10">
                    <div class="action-btn" id="deleteBtn" onclick="toggleDeleteMode()"><i class="fa-solid fa-trash-can"></i><span>Delete</span></div>
                    <div class="add-btn" onclick="openARModal()"><i class="fa-solid fa-plus"></i><span>Add Note</span></div>
                    <div class="action-btn" style="opacity:0; pointer-events:none;"><i class="fa-solid fa-pen"></i><span>Edit</span></div> 
                </div>
                <button class="w-10 h-10 text-white bg-black/50 border border-white/10 rounded flex items-center justify-center pointer-events-auto hover:text-cyan-400 transition-colors" onclick="document.documentElement.requestFullscreen()"><i class="fa-solid fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div id="arModal">
        <div class="bg-[#0f0f14] w-full max-w-[400px] p-8 rounded-3xl border border-white/10 relative">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-white text-xl font-bold"><i class="fa-solid fa-expand text-cyan-400 mr-2"></i> Anchor Note</h2>
                <button onclick="closeARModal()" class="text-slate-500 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="text" id="arNoteTitle" class="w-full p-4 mb-4 rounded-xl bg-white/5 border border-transparent text-white outline-none modal-input" placeholder="Title..." />
            <textarea id="arNoteContent" class="w-full p-4 mb-4 rounded-xl bg-white/5 border border-transparent text-white outline-none resize-none h-24 modal-textarea" placeholder="Description..."></textarea>
            <button id="arSaveNoteBtn" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-bold rounded-xl transition-colors" onclick="preparePlacement()">Set Position</button>
        </div>
    </div>

    <script>
        window.customAlert = (message, title = "Notification") => { document.getElementById('alertTitle').innerText = title; document.getElementById('alertMessage').innerText = message; document.getElementById('customAlert').style.display = 'flex'; }; 
        window.closeCustomAlert = () => document.getElementById('customAlert').style.display = 'none';
        
        window.customConfirm = (message, title, callback) => { document.getElementById('confirmTitle').innerText = title; document.getElementById('confirmMessage').innerText = message; document.getElementById('customConfirm').style.display = 'flex'; window._confirmCallback = callback; }; 
        window.closeCustomConfirm = (result) => { document.getElementById('customConfirm').style.display = 'none'; if (window._confirmCallback) window._confirmCallback(result); };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDfdbA_iCryNL6JuOkZtSaPH3pEfza_rs0", 
            authDomain: "visinote-66f90.firebaseapp.com", 
            projectId: "visinote-66f90", 
            storageBucket: "visinote-66f90.firebasestorage.app", 
            messagingSenderId: "382835155909", 
            appId: "1:382835155909:web:f7f8f44b85f8cdc1dce1ac" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getFirestore(app);

        let currentUserUid = null; 
        let isPlacementMode = false; 
        let pendingNoteData = null; 
        let isDeleteMode = false; 
        
        const notesGroup = document.getElementById('notesGroup');
        const statusText = document.getElementById('statusText');
        const statusBadge = document.getElementById('statusBadge');
        const crosshair = document.getElementById('crosshair');
        const tapZone = document.getElementById('tapZone');
        const depthControl = document.getElementById('depthControl');

        window.updateDepthLabel = () => { document.getElementById('depthLabel').innerText = document.getElementById('depthSlider').value + "m"; };
        
        window.addEventListener('load', () => { 
            setInterval(() => { 
                const arVideo = document.querySelector('video'); 
                if (arVideo && !arVideo.classList.contains('fixed')) { 
                    arVideo.classList.add('fixed'); 
                    document.getElementById('ar-container')?.appendChild(arVideo); 
                } 
            }, 1000); 
        });

        // GPS Fetcher
        const getGPSLocation = () => new Promise((resolve) => {
            if (!navigator.geolocation) return resolve({ lat: null, lng: null });
            navigator.geolocation.getCurrentPosition( 
                pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }), 
                err => resolve({ lat: null, lng: null }), 
                { enableHighAccuracy: true, timeout: 4000 } 
            );
        });

        // Load & Render Notes
        window.loadARNotes = async () => {
            if (!currentUserUid) return;
            try {
                const q = query(collection(db, "notes"), where("uid", "==", currentUserUid));
                const snap = await getDocs(q); 
                notesGroup.innerHTML = ''; 
                
                snap.forEach((docSnap) => {
                    const data = docSnap.data(); 
                    const el = document.createElement('a-entity');
                    const posX = typeof data.x === 'number' ? data.x : 0, posY = typeof data.y === 'number' ? data.y : 1.6, posZ = typeof data.z === 'number' ? data.z : -2;
                    
                    el.setAttribute('position', `${posX} ${posY} ${posZ}`); 
                    el.setAttribute('billboard', ''); 
                    el.classList.add('raycastable-note'); 
                    
                    // Massive Hitbox for easy tapping
                    el.setAttribute('geometry', 'primitive: plane; width: 1.6; height: 1.2'); 
                    el.setAttribute('material', 'opacity: 0; transparent: true;');
                    
                    let html = `
                        <a-plane color="#0f0f14" width="1.4" height="0.8" opacity="0.9" position="0 0 -0.01"></a-plane>
                        <a-plane color="#0284c7" width="1.4" height="0.05" position="0 0.4 0"></a-plane>
                        <a-text value="${data.title || 'Note'}" align="center" position="0 0.2 0.01" color="#22d3ee" width="3" wrap-count="20"></a-text>
                        <a-text value="${data.content || ''}" align="center" position="0 -0.1 0.01" color="#ffffff" width="2.5" wrap-count="25"></a-text>
                    `;
                    
                    if (isDeleteMode) {
                        html += `<a-circle color="#ef4444" radius="0.15" position="0.6 0.35 0.02"><a-text value="X" align="center" color="white"></a-text></a-circle>`;
                    }
                    
                    el.innerHTML = html;
                    
                    el.addEventListener('click', async (e) => {
                        if (isDeleteMode) {
                            if (data.uid !== currentUserUid) return customAlert("Unauthorized.", "Error");
                            customConfirm(`Delete note: "${data.title}"?`, "Delete Note", async (confirmed) => { 
                                if(confirmed) { await deleteDoc(doc(db, "notes", docSnap.id)); window.loadARNotes(); } 
                            });
                        } 
                    });
                    notesGroup.appendChild(el);
                });
            } catch (err) { console.error("Load Notes Error: ", err); }
        };

        window.openARModal = () => { document.getElementById('arModal').style.display = 'flex'; };
        window.closeARModal = () => { document.getElementById('arModal').style.display = 'none'; document.getElementById('arNoteTitle').value = ""; document.getElementById('arNoteContent').value = ""; };

        window.preparePlacement = () => {
            const title = document.getElementById("arNoteTitle").value.trim();
            const content = document.getElementById("arNoteContent").value.trim();
            
            if (!currentUserUid) return customAlert("Error: User not found.", "Auth Error"); 
            if (!title || !content) return customAlert("Fill in both title and description!", "Required");
            
            pendingNoteData = { uid: currentUserUid, title, content }; 
            isPlacementMode = true; 
            isDeleteMode = false; 
            document.getElementById('deleteBtn').classList.remove('delete-active'); 
            
            window.closeARModal(); 
            tapZone.style.display = "block"; 
            depthControl.style.display = "flex"; 
            
            statusText.innerText = "ADJUST DISTANCE & TAP TO STICK"; 
            statusBadge.style.borderColor = "#22d3ee"; 
            crosshair.style.borderColor = "#22d3ee"; 
            crosshair.style.transform = "translate(-50%, -50%) scale(1.5)";
        };

        window.handlePlacementTap = async () => {
            if (!isPlacementMode || !pendingNoteData) return; 
            const cam = document.querySelector('#arCamera'); 
            if (!cam) return; 
            
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            
            const selectedDistance = parseFloat(document.getElementById('depthSlider').value);
            const worldPos = new THREE.Vector3(); 
            cam.object3D.getWorldPosition(worldPos); 
            const dir = new THREE.Vector3(0, 0, -1); 
            dir.applyQuaternion(cam.object3D.quaternion);
            
            const newX = parseFloat((worldPos.x + (dir.x * selectedDistance)).toFixed(3));
            const newY = parseFloat((worldPos.y + (dir.y * selectedDistance)).toFixed(3));
            const newZ = parseFloat((worldPos.z + (dir.z * selectedDistance)).toFixed(3));
            
            statusText.innerText = "FETCHING GPS..."; 
            const coords = await getGPSLocation();
            
            try {
                statusText.innerText = "SAVING ANCHOR...";
                await addDoc(collection(db, "notes"), { 
                    ...pendingNoteData, 
                    x: newX, y: newY, z: newZ, 
                    lat: coords.lat, lng: coords.lng, 
                    timestamp: serverTimestamp() 
                });
                
                isPlacementMode = false; 
                pendingNoteData = null; 
                tapZone.style.display = "none"; 
                depthControl.style.display = "none"; 
                
                statusText.innerText = "SPATIAL TRACKING ACTIVE"; 
                statusBadge.style.borderColor = "rgba(2, 132, 199, 0.4)"; 
                crosshair.style.borderColor = "rgba(255,255,255,0.5)"; 
                crosshair.style.transform = "translate(-50%, -50%) scale(1)"; 
                
                window.loadARNotes(); 
            } catch (err) { customAlert("Failed to anchor note.", "Error"); }
        };

        window.toggleDeleteMode = () => { 
            const btn = document.getElementById('deleteBtn'); 
            isDeleteMode = !isDeleteMode; 
            isPlacementMode = false; 
            
            tapZone.style.display = "none"; 
            depthControl.style.display = "none"; 
            
            if(isDeleteMode) { 
                btn.classList.add('delete-active'); 
                statusText.innerText = "TAP DIRECTLY ON A NOTE TO DELETE"; 
            } else { 
                btn.classList.remove('delete-active'); 
                statusText.innerText = "SPATIAL TRACKING ACTIVE"; 
            } 
            window.loadARNotes(); 
        };

        onAuthStateChanged(auth, (user) => { 
            if (user) { 
                currentUserUid = user.uid; 
                setTimeout(window.loadARNotes, 1500); 
            } else { 
                window.location.replace("loginPage.html"); 
            } 
        });
        
        document.getElementById('logout-btn')?.addEventListener('click', () => { 
            signOut(auth).then(() => { window.location.href = "index.html"; }); 
        });
    </script>
</body>
</html>
